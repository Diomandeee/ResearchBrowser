name: ResearchBrowser
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ResearchBrowser:
    type: application
    platform: iOS
    sources:
      - path: ResearchBrowser
    resources:
      - path: ResearchBrowser/Assets.xcassets
    info:
      path: ResearchBrowser/Info.plist
      properties:
        CFBundleDisplayName: "Research Browser"
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.researchbrowser
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
    developmentTeam: "8643C988C4"
    dependencies: []

  ResearchBrowserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ResearchBrowserTests
    dependencies:
      - target: ResearchBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.researchbrowser.tests
