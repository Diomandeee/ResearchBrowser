name: ResearchBrowser
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  swift-composable-architecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  OpenClawKit:
    url: https://github.com/Diomandeee/OpenClawKit
    exactVersion: "1.0.2"

settings:
  base:
    SWIFT_VERSION: "5"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ResearchBrowser:
    type: application
    platform: iOS
    sources:
      - path: ResearchBrowser
    resources:
      - path: ResearchBrowser/Assets.xcassets
    info:
      path: ResearchBrowser/Info.plist
      properties:
        CFBundleDisplayName: "Research Browser"
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.researchbrowser
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
    developmentTeam: "8643C988C4"
    dependencies:
      - package: swift-composable-architecture
        product: ComposableArchitecture
      - package: supabase-swift
        product: Supabase
      - package: OpenClawKit
        product: OpenClawCore
      - package: OpenClawKit
        product: OpenClawSupabase

  ResearchBrowserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ResearchBrowserTests
    dependencies:
      - target: ResearchBrowser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.researchbrowser.tests
